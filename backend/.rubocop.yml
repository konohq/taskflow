plugins:
  - rubocop-rails

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  UseCache: false
  Exclude:
    - "bin/**/*"
    - "db/*_schema.rb"
    - "db/schema.rb"
    - "log/**/*"
    - "storage/**/*"
    - "tmp/**/*"
    - "vendor/**/*"

Rails:
  Enabled: true

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/GlobalStdStream:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/BlockComments:
  Enabled: false

Layout/EndOfLine:
  Enabled: false

Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false

Layout/SpaceInsidePercentLiteralDelimiters:
  Enabled: false

Bundler/OrderedGems:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
